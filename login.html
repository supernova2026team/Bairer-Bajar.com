<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">

    <!-- favicon link -->
    <link rel="shortcut icon" href="./assets/favicon.png" type="image/x-icon">

    <title>Bahirer Bazar</title>

    <style>
        * {
            font-family: "Arimo", sans-serif;
        }
        body{
            background-color: #F3F4EC;
        }
    </style>

</head>

<body>
    <section id="login-section">
        <div class="brand-logo">
            <img src="./assets/brand-logo.png" alt="brand-logo">
        </div>
        <div class="login-form">
            <div class="wlc-message">
                <h1>স্বাগতম!</h1>
                <p>আপনার অ্যাকাউন্ট লগ-ইন করুন</p>
            </div>
            <div class="user-field">
                <div class="input-field">
                    <input type="text" id="number-email" placeholder="মোবাইল নাম্বার বা ইমেইল">
                    <input type="password" id="password" placeholder="পাসওয়ার্ড">
                </div>
                <button class="btn">
                    লগ-ইন করুন
                </button>
                <p>পাসওয়ার্ড ভুলে গেছেন?</p>
                <p>নতুন অ্যাকাউন্ট তৈরি করুন</p>
            </div>
        </div>
    </section>

    <section id="sign-up-section">
        <div class="brand-logo">
            <img src="./assets/brand-logo.png" alt="brand-logo">
        </div>
        <div class="signup-form">
            <h1>নতুন অ্যাকাউন্ট তৈরি করুন</h1>
            <p>আমাদের সাথে যুক্ত হোন</p>
            <div class="input-field">
                <input type="text" id="full-name" placeholder="পূর্ণ নাম">
                <input type="number" id="number" placeholder="মোবাইল নাম্বার">
                <input type="email" id="email" placeholder="ইমেইল(ঐচ্ছিক)">
                <input type="password" id="password" placeholder="পাসওয়ার্ড">
                <input type="password" id="password" placeholder="পাসওয়ার্ড নিশ্চিত করুন">
                <div class="chackbox">
                    <input type="checkbox">
                    <p>আমি <span>শর্তাবলী</span> এবং <span>গোপনীয়তা নীতি</span> মেনে নিচ্ছি </p>
                </div>
                <button class="btn">নিবন্ধন করুন</button>
                <p>ইতিমধ্যে অ্যাকাউন্ট আছে? <span>লগ-ইন করুন</span></p>
            </div>
        </div>
    </section>
</body>

</html>
