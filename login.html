<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">

    <!-- favicon link -->
    <link rel="shortcut icon" href="./assets/brand-logo.png" type="image/x-icon">

    <title>Bahirer Bazar</title>

    <style>
        * {
            font-family: "Arimo", sans-serif;
        }
    </style>

</head>

<body>
    <section id="login-section">
        <div class="brand-logo">
            <img src="./assets/brand-logo.png" alt="brand-logo">
        </div>
        <div class="login-form">
            <div class="wlc-message">
                <h1>স্বাগতম!</h1>
                <p>আপনার অ্যাকাউন্ট লগ-ইন করুন</p>
            </div>
            <div class="user-field">
                <div class="input-field">
                    <input type="text" id="number-email" placeholder="মোবাইল নাম্বার বা ইমেইল">
                    <input type="password" id="password" placeholder="পাসওয়ার্ড">
                </div>
                <button class="btn">
                    লগ-ইন করুন
                </button>
                <p>পাসওয়ার্ড ভুলে গেছেন?</p>
                <p>নতুন অ্যাকাউন্ট তৈরি করুন</p>
            </div>
        </div>
    </section>
</body>

</html>
